name: Publicar panel (GitHub Pages)

# Publica la carpeta web/ en GitHub Pages cada vez que cambia.
on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  desplegar:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir la carpeta web/ como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Desplegar a Pages
        id: deployment
        uses: actions/deploy-pages@v4
